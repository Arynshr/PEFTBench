dataset:
  name: "alpaca"
  hf_repo: "tatsu-lab/alpaca"
  train_split: "train"
  val_ratio: 0.1
  seed: 42
  max_samples: 1000

training:
  output_dir: "checkpoints"
  num_train_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 50
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 3
  bf16: true
  report_to: "tensorboard"
  logging_dir: "logs"

resource_monitor:
  log_gpu_usage: true
  interval_seconds: 30
